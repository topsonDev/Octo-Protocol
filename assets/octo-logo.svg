<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Octo logo">
  <!--
    Octo brand mark: a violet octopus / "O".
    A large open loop forms the head; curling tentacle spirals sit below.
    Single stroke weight, rounded caps — geometric and friendly.
  -->
  <g stroke="#7C5CFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head: large open loop, opening at the lower-left, tail sweeping down the right -->
    <path d="M196 286
             a92 92 0 1 1 104 -18
             c14 26 12 52 -10 74" />

    <!-- Left tentacle: inward spiral curl -->
    <path d="M150 268
             c-30 -2 -52 18 -52 44
             c0 20 16 34 34 34
             c14 0 24 -10 24 -22
             c0 -10 -8 -16 -16 -16
             c-7 0 -12 5 -12 11" />

    <!-- Center-left tentacle: downward curl -->
    <path d="M210 300
             c-18 18 -26 40 -22 60
             c3 16 16 26 30 24
             c12 -2 19 -12 17 -23
             c-2 -9 -10 -13 -17 -11" />

    <!-- Center-right tentacle: mirrored downward curl -->
    <path d="M268 312
             c10 22 8 46 -6 62
             c-11 12 -26 13 -36 4
             c-9 -8 -9 -20 -1 -27
             c7 -6 16 -5 20 1" />

    <!-- Right tentacle: outward spiral curl -->
    <path d="M306 296
             c28 6 50 28 50 54
             c0 20 -16 34 -34 34
             c-14 0 -24 -10 -24 -22
             c0 -10 8 -16 16 -16
             c7 0 12 5 12 11" />
  </g>
</svg>
