services:
  db:
    image: postgres:17-alpine
    container_name: blockme-db
    environment:
      POSTGRES_USER: blockme
      POSTGRES_PASSWORD: blockme
      POSTGRES_DB: blockme
    ports:
      - "5432:5432"
    volumes:
      - blockme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockme"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional DB UI — `docker compose up adminer` — http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: blockme-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    profiles: ["tools"]

volumes:
  blockme_pgdata:
