name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: octo
          POSTGRES_PASSWORD: octo
          POSTGRES_DB: octo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U octo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # octo-store uses runtime sqlx queries (not the compile-time query! macro), so the build is
      # hermetic; this URL lets the store integration tests run against the Postgres service.
      DATABASE_URL: postgres://octo:octo@localhost:5432/octo
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.84.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # --locked makes lockfile drift a hard failure in CI rather than cargo silently
        # regenerating Cargo.lock from manifests, which previously masked publisher-side out-of-sync
        # changes. See Octo-Protocol-org/Octo-Protocol#33 (sibling fix for toolchain-channel pinning).
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        # --locked: same rationale as Clippy above — fail loudly on lockfile drift.
        run: cargo test --workspace --locked

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: cargo-audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
